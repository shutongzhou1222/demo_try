<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小目标 - Life Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <script src="app.js"></script>
    <script>
        if (!isLoggedIn()) {
            window.location.href = 'login.html';
        }
    </script>
    <div class="container">
        <header>
            <h1><i class="fas fa-bullseye"></i> 小目标管理</h1>
            <p>设定目标，追踪进度，实现梦想</p>
            <div class="user-info">
                <span class="user-welcome">欢迎 <span id="currentUserName"></span></span>
                <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 退出</button>
            </div>
        </header>

        <nav>
            <ul>
                <li><a href="index.html"><i class="fas fa-home"></i> 首页</a></li>
                <li><a href="todo.html"><i class="fas fa-check-circle"></i> 待办</a></li>
                <li><a href="schedule.html"><i class="fas fa-clock"></i> 日程</a></li>
                <li><a href="period.html"><i class="fas fa-heartbeat"></i> 生理期</a></li>
                <li><a href="stats.html"><i class="fas fa-chart-bar"></i> 数据统计</a></li>
            </ul>
        </nav>

        <main>
            <!-- Stats -->
            <section class="stats-container fade-in">
                <div class="stat-card">
                    <div class="stat-number" id="totalGoals">0</div>
                    <div class="stat-label">全部目标</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="completedGoals">0</div>
                    <div class="stat-label">已完成</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="inProgressGoals">0</div>
                    <div class="stat-label">进行中</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="avgProgress">0%</div>
                    <div class="stat-label">平均进度</div>
                </div>
            </section>

            <!-- Add Goal -->
            <section class="card fade-in">
                <h2 class="card-title"><i class="fas fa-plus-circle"></i> 添加新目标</h2>
                <form id="goalForm">
                    <div class="form-group">
                        <label>目标标题</label>
                        <input type="text" class="form-control" id="goalTitle" placeholder="输入目标标题..." required>
                    </div>
                    <div class="form-group">
                        <label>目标描述（可选）</label>
                        <textarea class="form-control" id="goalDescription" placeholder="描述一下你的目标..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>目标日期（可选）</label>
                        <input type="date" class="form-control" id="goalDate">
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-plus"></i> 添加目标
                    </button>
                </form>
            </section>

            <!-- Goals List -->
            <section class="card fade-in">
                <h2 class="card-title"><i class="fas fa-list"></i> 我的目标</h2>
                <ul class="goal-list" id="goalList">
                    <!-- Goals will be rendered here -->
                </ul>

                <div id="emptyState" class="empty-state" style="display: none;">
                    <i class="fas fa-mountain"></i>
                    <h3>还没有目标</h3>
                    <p>设定你的第一个小目标吧！</p>
                </div>
            </section>
        </main>

        <footer>
            <p>Made with <i class="fas fa-heart" style="color: #f56565;"></i> by Life Tracker</p>
        </footer>
    </div>

    <!-- Edit Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title"><i class="fas fa-edit"></i> 编辑目标</h3>
                <button class="modal-close" onclick="closeEditModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="editForm">
                <div class="form-group">
                    <label>目标标题</label>
                    <input type="text" class="form-control" id="editTitle" required>
                </div>
                <div class="form-group">
                    <label>目标描述</label>
                    <textarea class="form-control" id="editDescription"></textarea>
                </div>
                <div class="form-group">
                    <label>目标日期</label>
                    <input type="date" class="form-control" id="editDate">
                </div>
                <div class="form-group">
                    <label>当前进度</label>
                    <div class="progress-input">
                        <input type="range" id="editProgress" min="0" max="100" value="0">
                        <span class="progress-value" id="editProgressValue">0%</span>
                    </div>
                </div>
                <input type="hidden" id="editId">
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存修改</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            renderGoals();
            updateStats();

            // Set default date to 30 days from now
            const defaultDate = new Date();
            defaultDate.setDate(defaultDate.getDate() + 30);
            document.getElementById('goalDate').value = defaultDate.toISOString().split('T')[0];

            // Form submission
            document.getElementById('goalForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const title = document.getElementById('goalTitle').value.trim();
                const description = document.getElementById('goalDescription').value.trim();
                const targetDate = document.getElementById('goalDate').value;
                
                if (title) {
                    addGoal(title, description, targetDate);
                    
                    // Reset form
                    document.getElementById('goalTitle').value = '';
                    document.getElementById('goalDescription').value = '';
                    
                    renderGoals();
                    updateStats();
                    showNotification('目标添加成功！加油！💪');
                }
            });

            // Edit form submission
            document.getElementById('editForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const id = document.getElementById('editId').value;
                const updates = {
                    title: document.getElementById('editTitle').value.trim(),
                    description: document.getElementById('editDescription').value.trim(),
                    targetDate: document.getElementById('editDate').value,
                    progress: parseInt(document.getElementById('editProgress').value)
                };
                
                if (updates.title) {
                    updateGoal(id, updates);
                    closeEditModal();
                    renderGoals();
                    updateStats();
                    showNotification('目标更新成功！');
                }
            });

            // Progress slider
            document.getElementById('editProgress').addEventListener('input', function() {
                document.getElementById('editProgressValue').textContent = this.value + '%';
            });
        });

        function renderGoals() {
            const goalList = document.getElementById('goalList');
            const emptyState = document.getElementById('emptyState');
            const goals = getGoals();

            // Sort: in-progress first, then by progress
            goals.sort((a, b) => {
                if (a.progress === 100 && b.progress !== 100) return 1;
                if (a.progress !== 100 && b.progress === 100) return -1;
                return b.progress - a.progress;
            });

            if (goals.length === 0) {
                goalList.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            goalList.innerHTML = goals.map(goal => {
                const daysLeft = goal.targetDate ? calculateDaysLeft(goal.targetDate) : null;
                const progressColor = goal.progress === 100 ? '#48bb78' : 
                                     goal.progress >= 70 ? '#667eea' : 
                                     goal.progress >= 40 ? '#ed8936' : '#f56565';
                
                return `
                    <li class="goal-item" data-id="${goal.id}">
                        <div class="goal-header">
                            <div>
                                <div class="goal-title">${escapeHtml(goal.title)}</div>
                                ${goal.description ? `<div class="goal-description">${escapeHtml(goal.description)}</div>` : ''}
                                ${goal.targetDate ? `
                                    <div style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 8px;">
                                        <i class="fas fa-calendar-alt"></i> 
                                        ${formatDate(goal.targetDate)}
                                        ${daysLeft !== null ? `<span style="margin-left: 10px; color: ${daysLeft < 0 ? '#f56565' : daysLeft < 7 ? '#ed8936' : '#48bb78'}">(${daysLeft < 0 ? '已过期' : '还剩 ' + daysLeft + ' 天'})</span>` : ''}
                                    </div>
                                ` : ''}
                            </div>
                            <div class="todo-actions">
                                <button class="todo-btn edit" onclick="openEditModal('${goal.id}')" title="编辑">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="todo-btn delete" onclick="deleteGoalItem('${goal.id}')" title="删除">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                        <div class="goal-progress-container">
                            <div class="goal-progress-bar">
                                <div class="goal-progress-fill" style="width: ${goal.progress}%; background: ${progressColor};"></div>
                            </div>
                            <div class="goal-progress-text">
                                <span>进度</span>
                                <span style="color: ${progressColor}; font-weight: 600;">${goal.progress}%</span>
                            </div>
                        </div>
                        ${goal.progress < 100 ? `
                            <div class="goal-actions">
                                <button class="btn btn-sm btn-primary" onclick="quickUpdateProgress('${goal.id}', ${Math.min(goal.progress + 10, 100)})">
                                    <i class="fas fa-plus"></i> 增加10%
                                </button>
                                <button class="btn btn-sm btn-success" onclick="quickUpdateProgress('${goal.id}', 100)">
                                    <i class="fas fa-check"></i> 完成目标
                                </button>
                            </div>
                        ` : `
                            <div class="goal-actions">
                                <span style="color: #48bb78; font-weight: 600;">
                                    <i class="fas fa-trophy"></i> 目标已完成！🎉
                                </span>
                            </div>
                        `}
                    </li>
                `;
            }).join('');
        }

        function quickUpdateProgress(id, progress) {
            updateGoalProgress(id, progress);
            renderGoals();
            updateStats();
            
            if (progress === 100) {
                showNotification('恭喜！目标已完成！🎉🎉🎉');
            } else {
                showNotification(`进度更新为 ${progress}%`);
            }
        }

        function deleteGoalItem(id) {
            confirmDialog('确定要删除这个目标吗？', () => {
                deleteGoal(id);
                renderGoals();
                updateStats();
                showNotification('目标已删除');
            });
        }

        function openEditModal(id) {
            const goal = getGoals().find(g => g.id === id);
            if (goal) {
                document.getElementById('editTitle').value = goal.title;
                document.getElementById('editDescription').value = goal.description || '';
                document.getElementById('editDate').value = goal.targetDate || '';
                document.getElementById('editProgress').value = goal.progress;
                document.getElementById('editProgressValue').textContent = goal.progress + '%';
                document.getElementById('editId').value = id;
                document.getElementById('editModal').classList.add('active');
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        function updateStats() {
            const stats = getGoalStats();
            document.getElementById('totalGoals').textContent = stats.total;
            document.getElementById('completedGoals').textContent = stats.completed;
            document.getElementById('inProgressGoals').textContent = stats.inProgress;
            document.getElementById('avgProgress').textContent = stats.avgProgress + '%';
        }

        function calculateDaysLeft(targetDate) {
            const target = new Date(targetDate);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            target.setHours(0, 0, 0, 0);
            const diffTime = target - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Close modal when clicking outside
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeEditModal();
            }
        });
    </script>
    <script>
        document.getElementById('currentUserName').textContent = getCurrentUser();
    </script>
</body>
</html>
