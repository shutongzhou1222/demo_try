<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心情日记 - Life Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <script src="app.js"></script>
    <script>
        if (!isLoggedIn()) {
            window.location.href = 'login.html';
        }
    </script>
    <div class="container">
        <header>
            <h1><i class="fas fa-book"></i> 心情日记</h1>
            <p>记录每一天的心情与故事</p>
            <div class="user-info">
                <span class="user-welcome">欢迎 <span id="currentUserName"></span></span>
                <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 退出</button>
            </div>
        </header>

        <nav>
            <ul>
                <li><a href="index.html"><i class="fas fa-home"></i> 首页</a></li>
                <li><a href="todo.html"><i class="fas fa-check-circle"></i> 待办</a></li>
                <li><a href="schedule.html"><i class="fas fa-clock"></i> 日程</a></li>
                <li><a href="period.html"><i class="fas fa-heartbeat"></i> 生理期</a></li>
                <li><a href="stats.html"><i class="fas fa-chart-bar"></i> 数据统计</a></li>
            </ul>
        </nav>

        <main>
            <!-- Stats -->
            <section class="stats-container fade-in">
                <div class="stat-card">
                    <div class="stat-number" id="totalDiaries">0</div>
                    <div class="stat-label">日记总数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="thisMonthDiaries">0</div>
                    <div class="stat-label">本月日记</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="dominantMood" style="font-size: 2rem;">-</div>
                    <div class="stat-label">主要心情</div>
                </div>
            </section>

            <!-- Write Diary -->
            <section class="card fade-in">
                <h2 class="card-title"><i class="fas fa-pen"></i> 写日记</h2>
                <form id="diaryForm">
                    <div class="form-group">
                        <label>今天心情如何？</label>
                        <div class="mood-selector" id="moodSelector">
                            <div class="mood-option" data-mood="happy" title="开心">
                                <span>😊</span>
                            </div>
                            <div class="mood-option" data-mood="excited" title="兴奋">
                                <span>🤩</span>
                            </div>
                            <div class="mood-option" data-mood="calm" title="平静">
                                <span>😌</span>
                            </div>
                            <div class="mood-option" data-mood="grateful" title="感恩">
                                <span>🙏</span>
                            </div>
                            <div class="mood-option" data-mood="tired" title="疲惫">
                                <span>😴</span>
                            </div>
                            <div class="mood-option" data-mood="sad" title="难过">
                                <span>😢</span>
                            </div>
                            <div class="mood-option" data-mood="anxious" title="焦虑">
                                <span>😰</span>
                            </div>
                            <div class="mood-option" data-mood="angry" title="生气">
                                <span>😠</span>
                            </div>
                        </div>
                        <input type="hidden" id="selectedMood" value="happy">
                    </div>
                    <div class="form-group">
                        <label>记录今天的故事</label>
                        <textarea class="form-control" id="diaryContent" rows="6" placeholder="写下今天发生的事情、感受和想法..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> 保存日记
                    </button>
                </form>
            </section>

            <!-- Diary List -->
            <section class="card fade-in">
                <h2 class="card-title"><i class="fas fa-history"></i> 日记历史</h2>
                <ul class="diary-list" id="diaryList">
                    <!-- Diaries will be rendered here -->
                </ul>

                <div id="emptyState" class="empty-state" style="display: none;">
                    <i class="fas fa-book-open"></i>
                    <h3>还没有日记</h3>
                    <p>写下你的第一篇日记吧！</p>
                </div>
            </section>
        </main>

        <footer>
            <p>Made with <i class="fas fa-heart" style="color: #f56565;"></i> by Life Tracker</p>
        </footer>
    </div>

    <!-- View Modal -->
    <div class="modal" id="viewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title"><i class="fas fa-book-open"></i> 日记详情</h3>
                <button class="modal-close" onclick="closeViewModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="viewContent">
                <!-- Content will be rendered here -->
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title"><i class="fas fa-edit"></i> 编辑日记</h3>
                <button class="modal-close" onclick="closeEditModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="editForm">
                <div class="form-group">
                    <label>心情</label>
                    <div class="mood-selector" id="editMoodSelector">
                        <div class="mood-option" data-mood="happy" title="开心">
                            <span>😊</span>
                        </div>
                        <div class="mood-option" data-mood="excited" title="兴奋">
                            <span>🤩</span>
                        </div>
                        <div class="mood-option" data-mood="calm" title="平静">
                            <span>😌</span>
                        </div>
                        <div class="mood-option" data-mood="grateful" title="感恩">
                            <span>🙏</span>
                        </div>
                        <div class="mood-option" data-mood="tired" title="疲惫">
                            <span>😴</span>
                        </div>
                        <div class="mood-option" data-mood="sad" title="难过">
                            <span>😢</span>
                        </div>
                        <div class="mood-option" data-mood="anxious" title="焦虑">
                            <span>😰</span>
                        </div>
                        <div class="mood-option" data-mood="angry" title="生气">
                            <span>😠</span>
                        </div>
                    </div>
                    <input type="hidden" id="editSelectedMood" value="happy">
                </div>
                <div class="form-group">
                    <label>内容</label>
                    <textarea class="form-control" id="editContent" rows="6" required></textarea>
                </div>
                <input type="hidden" id="editId">
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存修改</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        let selectedMood = 'happy';
        let editSelectedMood = 'happy';

        document.addEventListener('DOMContentLoaded', function() {
            renderDiaries();
            updateStats();
            setupMoodSelector();

            // Form submission
            document.getElementById('diaryForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const content = document.getElementById('diaryContent').value.trim();
                const mood = document.getElementById('selectedMood').value;
                
                if (content) {
                    addDiary(content, mood);
                    
                    // Reset form
                    document.getElementById('diaryContent').value = '';
                    selectMood('happy', 'moodSelector', 'selectedMood');
                    
                    renderDiaries();
                    updateStats();
                    showNotification('日记保存成功！');
                }
            });

            // Edit form submission
            document.getElementById('editForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const id = document.getElementById('editId').value;
                const updates = {
                    content: document.getElementById('editContent').value.trim(),
                    mood: document.getElementById('editSelectedMood').value
                };
                
                if (updates.content) {
                    updateDiary(id, updates);
                    closeEditModal();
                    renderDiaries();
                    updateStats();
                    showNotification('日记更新成功！');
                }
            });
        });

        function setupMoodSelector() {
            // Main mood selector
            document.querySelectorAll('#moodSelector .mood-option').forEach(option => {
                option.addEventListener('click', function() {
                    const mood = this.dataset.mood;
                    selectMood(mood, 'moodSelector', 'selectedMood');
                });
            });

            // Edit mood selector
            document.querySelectorAll('#editMoodSelector .mood-option').forEach(option => {
                option.addEventListener('click', function() {
                    const mood = this.dataset.mood;
                    selectMood(mood, 'editMoodSelector', 'editSelectedMood');
                });
            });

            // Select default mood
            selectMood('happy', 'moodSelector', 'selectedMood');
        }

        function selectMood(mood, selectorId, inputId) {
            const selector = document.getElementById(selectorId);
            const input = document.getElementById(inputId);
            
            selector.querySelectorAll('.mood-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            
            const selected = selector.querySelector(`[data-mood="${mood}"]`);
            if (selected) {
                selected.classList.add('selected');
                input.value = mood;
            }
        }

        function renderDiaries() {
            const diaryList = document.getElementById('diaryList');
            const emptyState = document.getElementById('emptyState');
            const diaries = getDiaries();

            if (diaries.length === 0) {
                diaryList.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            diaryList.innerHTML = diaries.map(diary => {
                const moodData = MOODS[diary.mood] || MOODS.happy;
                const preview = diary.content.substring(0, 100) + (diary.content.length > 100 ? '...' : '');
                
                return `
                    <li class="diary-item" data-id="${diary.id}">
                        <div class="diary-mood">${moodData.emoji}</div>
                        <div class="diary-date">
                            <i class="fas fa-calendar"></i>
                            ${formatDate(diary.createdAt)}
                            <span style="margin-left: 10px; color: var(--text-secondary);">
                                ${formatDateTime(diary.createdAt).split(' ')[1]}
                            </span>
                        </div>
                        <div class="diary-content">${escapeHtml(preview)}</div>
                        <div class="diary-actions">
                            <button class="btn btn-sm btn-primary" onclick="viewDiary('${diary.id}')">
                                <i class="fas fa-eye"></i> 查看
                            </button>
                            <button class="btn btn-sm btn-warning" onclick="openEditModal('${diary.id}')">
                                <i class="fas fa-edit"></i> 编辑
                            </button>
                            <button class="btn btn-sm btn-danger" onclick="deleteDiaryItem('${diary.id}')">
                                <i class="fas fa-trash"></i> 删除
                            </button>
                        </div>
                    </li>
                `;
            }).join('');
        }

        function viewDiary(id) {
            const diary = getDiaries().find(d => d.id === id);
            if (!diary) return;

            const moodData = MOODS[diary.mood] || MOODS.happy;
            
            document.getElementById('viewContent').innerHTML = `
                <div style="margin-bottom: 20px;">
                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px; color: var(--text-secondary);">
                        <i class="fas fa-calendar"></i>
                        <span>${formatDateTime(diary.createdAt)}</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
                        <span style="font-size: 2rem;">${moodData.emoji}</span>
                        <span style="font-weight: 600; color: var(--text-primary);">${moodData.label}</span>
                    </div>
                </div>
                <div class="diary-content" style="background: var(--bg-color); padding: 20px; border-radius: 12px; line-height: 1.8;">
                    ${escapeHtml(diary.content).replace(/\n/g, '<br>')}
                </div>
            `;
            
            document.getElementById('viewModal').classList.add('active');
        }

        function openEditModal(id) {
            const diary = getDiaries().find(d => d.id === id);
            if (!diary) return;

            document.getElementById('editContent').value = diary.content;
            document.getElementById('editId').value = id;
            selectMood(diary.mood, 'editMoodSelector', 'editSelectedMood');
            
            document.getElementById('editModal').classList.add('active');
        }

        function closeViewModal() {
            document.getElementById('viewModal').classList.remove('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        function deleteDiaryItem(id) {
            confirmDialog('确定要删除这篇日记吗？删除后无法恢复。', () => {
                deleteDiary(id);
                renderDiaries();
                updateStats();
                showNotification('日记已删除');
            });
        }

        function updateStats() {
            const stats = getDiaryStats();
            document.getElementById('totalDiaries').textContent = stats.total;
            document.getElementById('thisMonthDiaries').textContent = stats.thisMonth;
            
            const moodEl = document.getElementById('dominantMood');
            if (stats.dominantMood) {
                moodEl.textContent = stats.dominantMood.emoji;
                moodEl.title = stats.dominantMood.label;
            } else {
                moodEl.textContent = '-';
                moodEl.title = '';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Close modals when clicking outside
        document.getElementById('viewModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeViewModal();
            }
        });

        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeEditModal();
            }
        });
    </script>
    <script>
        document.getElementById('currentUserName').textContent = getCurrentUser();
    </script>
</body>
</html>
