<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Tracker - 个人生活记录</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <script src="app.js"></script>
    <script>
        if (!isLoggedIn()) {
            window.location.href = 'login.html';
        }
    </script>
    <div class="container">
        <header>
            <h1><i class="fas fa-heart"></i> Life Tracker</h1>
            <p>把每天的小确幸都记录下来，你超棒的！</p>
            <div class="user-info">
                <span class="user-welcome">欢迎 <span id="currentUserName"></span></span>
                <button class="btn-logout" onclick="openCloudSyncModal()"><i class="fas fa-cloud-upload-alt"></i> 同步</button>
                <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 退出</button>
            </div>
        </header>

        <nav>
            <ul>
                <li><a href="index.html" class="active"><i class="fas fa-home"></i> 首页</a></li>
                <li><a href="todo.html"><i class="fas fa-check-circle"></i> 待办</a></li>
                <li><a href="schedule.html"><i class="fas fa-clock"></i> 日程</a></li>
                <li><a href="period.html"><i class="fas fa-heartbeat"></i> 生理期</a></li>
                <li><a href="stats.html"><i class="fas fa-chart-bar"></i> 数据统计</a></li>
            </ul>
        </nav>

        <main>
            <!-- Greeting Section -->
            <section class="greeting-section fade-in">
                <div class="greeting-message" id="greetingMessage">今天是幸福的一天！</div>
                <div class="current-date" id="currentDate"></div>
            </section>

            <!-- Timeline Section (2-hour intervals, compact) -->
            <section class="card fade-in">
                <div class="section-header">
                    <h2><i class="fas fa-calendar-day"></i> 今日日程</h2>
                    <button class="btn btn-primary btn-sm" onclick="openScheduleModal()">
                        <i class="fas fa-plus"></i> 添加
                    </button>
                </div>

                <div class="timeline-date-nav">
                    <button class="btn btn-secondary" onclick="changeTimelineDate(-1)">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <span class="timeline-current-date" id="timelineCurrentDate"></span>
                    <button class="btn btn-secondary" onclick="changeTimelineDate(1)">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                    <button class="btn btn-primary btn-sm" onclick="goToToday()">今天</button>
                </div>

                <div class="timeline-container">
                    <div class="timeline" id="timelineList">
                    </div>
                </div>
            </section>

            <!-- Today Health Section -->
            <section class="card fade-in">
                <h2 class="card-title"><i class="fas fa-heartbeat"></i> 今天保持健康了吗</h2>
                <div class="feature-grid">
                    <a href="exercise.html" class="feature-card">
                        <div class="feature-icon" style="background: var(--success-color);">
                            <i class="fas fa-running"></i>
                        </div>
                        <h3>运动记录</h3>
                        <p>劳逸结合最重要~</p>
                    </a>
                    <a href="milktea.html" class="feature-card">
                        <div class="feature-icon" style="background: var(--danger-color);">
                            <i class="fas fa-coffee"></i>
                        </div>
                        <h3>奶茶记录</h3>
                        <p>记得少喝奶茶哦~</p>
                    </a>
                    <a href="reading.html" class="feature-card">
                        <div class="feature-icon" style="background: var(--warning-color);">
                            <i class="fas fa-book-open"></i>
                        </div>
                        <h3>读书打卡</h3>
                        <p>书籍是人类进步的阶梯</p>
                    </a>
                </div>
            </section>

            <!-- Todo Section - 今日/明日/本周 -->
            <section class="card fade-in">
                <div class="section-header">
                    <h2><i class="fas fa-check-circle"></i> 待办事项</h2>
                    <a href="todo.html" class="btn btn-primary btn-sm">
                        <i class="fas fa-plus"></i> 查看全部
                    </a>
                </div>
                <div class="filter-tabs">
                    <button class="filter-tab active" data-filter="today" onclick="switchTodoFilter('today')">今日待办</button>
                    <button class="filter-tab" data-filter="tomorrow" onclick="switchTodoFilter('tomorrow')">明日待办</button>
                    <button class="filter-tab" data-filter="week" onclick="switchTodoFilter('week')">本周待办</button>
                </div>
                <div id="todoListContainer">
                </div>
            </section>

            <!-- Mood Journal Section -->
            <section class="card fade-in">
                <div class="section-header">
                    <h2><i class="fas fa-heart"></i> 今日心情</h2>
                    <button class="btn btn-primary btn-sm" onclick="openMoodModal()">
                        <i class="fas fa-edit"></i> 记录心情
                    </button>
                </div>
                <div id="todayMoodContainer">
                    <div class="mood-empty" style="text-align: center; padding: 20px; color: var(--text-secondary);">
                        <i class="fas fa-smile" style="font-size: 2rem; opacity: 0.3;"></i>
                        <p style="margin-top: 10px;">今天的心情怎么样？</p>
                        <button class="btn btn-secondary btn-sm" onclick="openMoodModal()" style="margin-top: 10px;">
                            <i class="fas fa-pen"></i> 写点什么
                        </button>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>Made with <i class="fas fa-heart" style="color: var(--danger-color);"></i> by Life Tracker</p>
        </footer>
    </div>

    <div class="modal" id="scheduleModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title"><i class="fas fa-plus-circle"></i> 添加日程</h3>
                <button class="modal-close" onclick="closeScheduleModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="scheduleForm">
                <div class="form-group">
                    <label>日期</label>
                    <input type="date" class="form-control" id="scheduleDate" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>开始时间</label>
                        <input type="time" class="form-control" id="scheduleStartTime" required>
                    </div>
                    <div class="form-group">
                        <label>结束时间</label>
                        <input type="time" class="form-control" id="scheduleEndTime">
                    </div>
                </div>
                <div class="form-group">
                    <label>日程名称</label>
                    <input type="text" class="form-control" id="scheduleTitle" placeholder="输入日程名称..." required>
                </div>
                <div class="form-group">
                    <label>地点（可选）</label>
                    <input type="text" class="form-control" id="scheduleLocation" placeholder="输入地点...">
                </div>
                <div class="form-group">
                    <label>分类</label>
                    <div class="category-selector" id="indexCategorySelector">
                        <button type="button" class="category-btn active" data-category="work" style="--cat-color: #E74C3C;">
                            <i class="fas fa-briefcase"></i> 工作
                        </button>
                        <button type="button" class="category-btn" data-category="study" style="--cat-color: #3498DB;">
                            <i class="fas fa-book"></i> 学习
                        </button>
                        <button type="button" class="category-btn" data-category="entertainment" style="--cat-color: #9B59B6;">
                            <i class="fas fa-gamepad"></i> 娱乐
                        </button>
                        <button type="button" class="category-btn" data-category="rest" style="--cat-color: #1ABC9C;">
                            <i class="fas fa-bed"></i> 休息
                        </button>
                        <button type="button" class="category-btn" data-category="travel" style="--cat-color: #F39C12;">
                            <i class="fas fa-plane"></i> 旅游
                        </button>
                        <button type="button" class="category-btn" data-category="exercise" style="--cat-color: #27AE60;">
                            <i class="fas fa-running"></i> 运动
                        </button>
                        <button type="button" class="category-btn" data-category="meal" style="--cat-color: #E67E22;">
                            <i class="fas fa-utensils"></i> 吃饭
                        </button>
                    </div>
                    <input type="hidden" id="scheduleCategory" value="work">
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeScheduleModal()">取消</button>
                    <button type="submit" class="btn btn-primary">添加</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="cloudSyncModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title"><i class="fas fa-cloud-upload-alt"></i> 云同步设置</h3>
                <button class="modal-close" onclick="closeCloudSyncModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div style="padding: 10px 0;">
                <p style="margin-bottom: 15px; color: var(--text-secondary); font-size: 0.9rem;">
                    使用 JSONBin.io 免费服务实现跨设备同步
                </p>
                <div class="form-group">
                    <label>Bin ID</label>
                    <input type="text" class="form-control" id="cloudBinId" placeholder="请输入您的 Bin ID">
                </div>
                <div class="form-group">
                    <label>API Key</label>
                    <input type="password" class="form-control" id="cloudApiKey" placeholder="请输入您的 API Key">
                </div>
                <div id="cloudSyncStatus" style="margin-bottom: 15px; font-size: 0.85rem;"></div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeCloudSyncModal()">取消</button>
                    <button type="button" class="btn btn-secondary" onclick="loadDataFromCloud()"><i class="fas fa-cloud-download-alt"></i> 从云端下载</button>
                    <button type="button" class="btn btn-primary" onclick="saveCloudSync()"><i class="fas fa-save"></i> 保存并同步</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="moodModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title"><i class="fas fa-heart"></i> 记录今日心情</h3>
                <button class="modal-close" onclick="closeMoodModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="moodForm">
                <div class="form-group">
                    <label>今天的心情</label>
                    <div class="mood-selector">
                        <button type="button" class="mood-option" data-mood="great" onclick="selectMood(this)">
                            😄
                        </button>
                        <button type="button" class="mood-option" data-mood="good" onclick="selectMood(this)">
                            🙂
                        </button>
                        <button type="button" class="mood-option" data-mood="okay" onclick="selectMood(this)">
                            😐
                        </button>
                        <button type="button" class="mood-option" data-mood="bad" onclick="selectMood(this)">
                            😔
                        </button>
                        <button type="button" class="mood-option" data-mood="terrible" onclick="selectMood(this)">
                            😢
                        </button>
                    </div>
                    <input type="hidden" id="moodValue" value="">
                </div>
                <div class="form-group">
                    <label>记录一下</label>
                    <textarea class="form-control" id="moodContent" rows="5" placeholder="今天做了哪些了不起的事情？遇到了什么挫折？有什么感想？"></textarea>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeMoodModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        let currentTimelineDate = getToday();
        let currentTodoFilter = 'today';

        document.addEventListener('DOMContentLoaded', function() {
            loadGreeting();
            loadCurrentDate();
            loadTimeline();
            loadTodos();
            loadTodayMood();
            initIndexCategorySelector();
        });

        function initIndexCategorySelector() {
            const buttons = document.querySelectorAll('#indexCategorySelector .category-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', function() {
                    buttons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    document.getElementById('scheduleCategory').value = this.dataset.category;
                });
            });
        }

        function loadGreeting() {
            const greeting = getGreeting();
            document.getElementById('greetingMessage').textContent = greeting;
        }

        function loadCurrentDate() {
            const date = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('currentDate').textContent = date.toLocaleDateString('zh-CN', options);
        }

        function generateTimeline() {
            const schedules = getSchedulesByDate(currentTimelineDate);
            if (schedules.length === 0) {
                return '<div style="text-align:center;padding:40px;color:var(--text-secondary);">当日暂无日程安排</div>';
            }
            
            const allTimes = new Set();
            schedules.forEach(s => {
                allTimes.add(s.startTime);
                if (s.endTime) allTimes.add(s.endTime);
            });
            const sortedTimes = Array.from(allTimes).sort();
            
            const hourHeight = 50;
            
            let html = '<div class="dynamic-timeline">';
            schedules.forEach((schedule, idx) => {
                const startIdx = sortedTimes.indexOf(schedule.startTime);
                const endIdx = schedule.endTime ? sortedTimes.indexOf(schedule.endTime) : startIdx + 1;
                const durationSlots = endIdx - startIdx;
                const height = Math.max(durationSlots * hourHeight - 10, 30);
                
                const cat = SCHEDULE_CATEGORIES[schedule.category] || SCHEDULE_CATEGORIES.work;
                const timeDisplay = schedule.endTime 
                    ? `${schedule.startTime} - ${schedule.endTime}` 
                    : schedule.startTime;
                
                html += `
                    <div class="timeline-item" style="height: ${height}px; border-left-color: ${cat.color}; margin-bottom: 10px;">
                        <div class="timeline-time" style="color: ${cat.color};">
                            <i class="fas fa-${cat.icon}"></i> ${timeDisplay}
                            <span class="category-tag" style="background: ${cat.color};">${cat.label}</span>
                        </div>
                        <div class="timeline-title">${escapeHtml(schedule.title)}</div>
                        ${schedule.location ? `<div class="timeline-location"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(schedule.location)}</div>` : ''}
                        <button class="todo-btn delete" onclick="deleteScheduleItem('${schedule.id}')" title="删除">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }

        function loadTimeline() {
            const container = document.getElementById('timelineList');
            const dateDisplay = document.getElementById('timelineCurrentDate');
            const date = new Date(currentTimelineDate);
            dateDisplay.textContent = date.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'long' });
            container.innerHTML = generateTimeline();
        }

        function changeTimelineDate(delta) {
            const date = new Date(currentTimelineDate);
            date.setDate(date.getDate() + delta);
            currentTimelineDate = date.toISOString().split('T')[0];
            loadTimeline();
        }

        function goToToday() {
            currentTimelineDate = getToday();
            loadTimeline();
        }

        function openScheduleModal() {
            document.getElementById('scheduleDate').value = currentTimelineDate;
            document.getElementById('scheduleModal').classList.add('active');
        }

        function closeScheduleModal() {
            document.getElementById('scheduleModal').classList.remove('active');
            document.getElementById('scheduleForm').reset();
            document.querySelectorAll('#indexCategorySelector .category-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('#indexCategorySelector .category-btn[data-category="work"]').classList.add('active');
            document.getElementById('scheduleCategory').value = 'work';
        }

        document.getElementById('scheduleForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const date = document.getElementById('scheduleDate').value;
            const startTime = document.getElementById('scheduleStartTime').value;
            const endTime = document.getElementById('scheduleEndTime').value;
            const title = document.getElementById('scheduleTitle').value.trim();
            const location = document.getElementById('scheduleLocation').value.trim();
            const category = document.getElementById('scheduleCategory').value;
            if (title && date && startTime) {
                addSchedule(date, startTime, endTime, title, location, category);
                closeScheduleModal();
                currentTimelineDate = date;
                loadTimeline();
                showNotification('日程添加成功！');
            }
        });

        function deleteScheduleItem(id) {
            confirmDialog('确定要删除这个日程吗？', () => {
                deleteSchedule(id);
                loadTimeline();
                showNotification('日程已删除');
            });
        }

        function loadTodos() {
            const todos = getTodos();
            const today = getToday();
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            const tomorrowStr = tomorrow.toISOString().split('T')[0];

            const weekEnd = new Date();
            weekEnd.setDate(weekEnd.getDate() + 7);
            const weekEndStr = weekEnd.toISOString().split('T')[0];

            let filteredTodos = [];
            if (currentTodoFilter === 'today') {
                filteredTodos = todos.filter(t => t.createdAt.split('T')[0] === today && !t.completed);
            } else if (currentTodoFilter === 'tomorrow') {
                filteredTodos = todos.filter(t => t.createdAt.split('T')[0] === tomorrowStr && !t.completed);
            } else {
                filteredTodos = todos.filter(t => {
                    const todoDate = new Date(t.createdAt);
                    return todoDate >= new Date(today) && todoDate <= new Date(weekEndStr) && !t.completed;
                });
            }

            const container = document.getElementById('todoListContainer');

            if (filteredTodos.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="padding: 20px;">
                        <i class="fas fa-clipboard-list" style="font-size: 1.5rem;"></i>
                        <p style="margin-top: 8px; font-size: 0.9rem;">暂无待办</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <ul class="todo-list">
                    ${filteredTodos.slice(0, 5).map(todo => `
                        <li class="todo-item ${todo.completed ? 'completed' : ''}" data-id="${todo.id}">
                            <div class="todo-checkbox" onclick="toggleTodoItem('${todo.id}')">
                                <i class="fas fa-check"></i>
                            </div>
                            <span class="todo-text">${escapeHtml(todo.text)}</span>
                        </li>
                    `).join('')}
                </ul>
            `;
        }

        function switchTodoFilter(filter) {
            currentTodoFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.dataset.filter === filter) {
                    tab.classList.add('active');
                }
            });
            loadTodos();
        }

        function toggleTodoItem(id) {
            toggleTodo(id);
            loadTodos();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('scheduleModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeScheduleModal();
            }
        });
    </script>

    <style>
        .dynamic-timeline {
            padding: 10px 0;
        }

        .timeline-item {
            margin-left: 10px;
            padding: 10px 15px;
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
            border-left: 4px solid;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .timeline-time {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .timeline-title {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .timeline-location {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .timeline-item .delete {
            align-self: flex-end;
            margin-top: -30px;
        }

        .mood-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            padding: 10px 0;
        }

        .mood-option {
            width: 50px;
            height: 50px;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            background: var(--card-bg);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mood-option:hover {
            transform: scale(1.1);
            border-color: var(--primary-color);
        }

        .mood-option.selected {
            border-color: var(--primary-color);
            background: rgba(102, 126, 234, 0.1);
            transform: scale(1.1);
        }
    </style>
    <script src="app.js"></script>
    <script>
        document.getElementById('currentUserName').textContent = getCurrentUser();

        function openCloudSyncModal() {
            const status = getCloudSyncStatus();
            document.getElementById('cloudBinId').value = status.binId || '';
            document.getElementById('cloudApiKey').value = CloudSync.API_KEY || '';
            updateCloudSyncStatus();
            document.getElementById('cloudSyncModal').classList.add('active');
        }

        function closeCloudSyncModal() {
            document.getElementById('cloudSyncModal').classList.remove('active');
        }

        function updateCloudSyncStatus() {
            const status = getCloudSyncStatus();
            const statusEl = document.getElementById('cloudSyncStatus');
            if (status.configured) {
                statusEl.innerHTML = `<span style="color: #27AE60;"><i class="fas fa-check-circle"></i> 已配置云同步</span>`;
            } else {
                statusEl.innerHTML = `<span style="color: var(--text-secondary);"><i class="fas fa-info-circle"></i> 请先配置云同步服务</span>`;
            }
        }

        function saveCloudSync() {
            const binId = document.getElementById('cloudBinId').value.trim();
            const apiKey = document.getElementById('cloudApiKey').value.trim();
            if (binId && apiKey) {
                setupCloudSync(binId, apiKey);
                syncAllData().then(() => {
                    showNotification('数据已同步到云端！');
                    closeCloudSyncModal();
                });
            } else {
                showNotification('请输入完整的 Bin ID 和 API Key');
            }
        }

        async function loadDataFromCloud() {
            const binId = document.getElementById('cloudBinId').value.trim();
            const apiKey = document.getElementById('cloudApiKey').value.trim();
            if (binId && apiKey) {
                setupCloudSync(binId, apiKey);
                await loadAllDataFromCloud();
                showNotification('数据已从云端下载！');
                closeCloudSyncModal();
                loadTimeline();
                loadTodos();
            } else {
                showNotification('请输入完整的 Bin ID 和 API Key');
            }
        }

        document.getElementById('cloudSyncModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeCloudSyncModal();
            }
        });

        // Mood Diary Functions
        const MOOD_LABELS = {
            great: '超开心',
            good: '开心',
            okay: '一般',
            bad: '低落',
            terrible: '难过'
        };

        const MOOD_EMOJIS = {
            great: '😄',
            good: '🙂',
            okay: '😐',
            bad: '😔',
            terrible: '😢'
        };

        function openMoodModal() {
            const today = getToday();
            const todayMoods = getMoods().filter(m => m.date === today);
            if (todayMoods.length > 0) {
                const mood = todayMoods[0];
                document.getElementById('moodValue').value = mood.type;
                document.getElementById('moodContent').value = mood.content || '';
                document.querySelectorAll('.mood-option').forEach(btn => {
                    btn.classList.toggle('selected', btn.dataset.mood === mood.type);
                });
            } else {
                document.getElementById('moodForm').reset();
                document.querySelectorAll('.mood-option').forEach(btn => btn.classList.remove('selected'));
                document.getElementById('moodValue').value = '';
            }
            document.getElementById('moodModal').classList.add('active');
        }

        function closeMoodModal() {
            document.getElementById('moodModal').classList.remove('active');
        }

        function selectMood(btn) {
            document.querySelectorAll('.mood-option').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            document.getElementById('moodValue').value = btn.dataset.mood;
        }

        function loadTodayMood() {
            const today = getToday();
            const todayMoods = getMoods().filter(m => m.date === today);
            const container = document.getElementById('todayMoodContainer');
            
            if (todayMoods.length === 0) {
                container.innerHTML = `
                    <div class="mood-empty" style="text-align: center; padding: 20px; color: var(--text-secondary);">
                        <i class="fas fa-smile" style="font-size: 2rem; opacity: 0.3;"></i>
                        <p style="margin-top: 10px;">今天的心情怎么样？</p>
                        <button class="btn btn-secondary btn-sm" onclick="openMoodModal()" style="margin-top: 10px;">
                            <i class="fas fa-pen"></i> 写点什么
                        </button>
                    </div>
                `;
                return;
            }

            const mood = todayMoods[0];
            const emoji = MOOD_EMOJIS[mood.type] || '😐';
            const label = MOOD_LABELS[mood.type] || '一般';
            
            container.innerHTML = `
                <div class="today-mood-display" style="display: flex; gap: 15px; align-items: flex-start;">
                    <div style="font-size: 3rem;">${emoji}</div>
                    <div style="flex: 1;">
                        <div style="font-weight: 600; color: var(--primary-color); margin-bottom: 5px;">${label}</div>
                        ${mood.content ? `<p style="color: var(--text-secondary); font-size: 0.9rem; line-height: 1.5;">${escapeHtml(mood.content)}</p>` : '<p style="color: var(--text-secondary); font-size: 0.9rem;">还没有写任何内容...</p>'}
                        <button class="btn btn-secondary btn-sm" onclick="openMoodModal()" style="margin-top: 10px;">
                            <i class="fas fa-edit"></i> 编辑
                        </button>
                    </div>
                </div>
            `;
        }

        document.getElementById('moodForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const moodType = document.getElementById('moodValue').value;
            const moodContent = document.getElementById('moodContent').value.trim();
            
            if (!moodType) {
                showNotification('请选择今天的心情');
                return;
            }

            const today = getToday();
            const moods = getMoods();
            const todayIndex = moods.findIndex(m => m.date === today);
            
            if (todayIndex !== -1) {
                moods[todayIndex] = { ...moods[todayIndex], type: moodType, content: moodContent };
            } else {
                moods.push({
                    id: generateId(),
                    date: today,
                    type: moodType,
                    content: moodContent,
                    createdAt: new Date().toISOString()
                });
            }
            
            saveMoods(moods);
            closeMoodModal();
            loadTodayMood();
            showNotification('心情已保存！');
        });

        document.getElementById('moodModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeMoodModal();
            }
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
