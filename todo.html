<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项 - Life Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <script src="app.js"></script>
    <script>
        if (!isLoggedIn()) {
            window.location.href = 'login.html';
        }
    </script>
    <div class="container">
        <header>
            <h1><i class="fas fa-check-circle"></i> 今日打怪清单</h1>
            <p>慢慢通关中</p>
            <div class="user-info">
                <span class="user-welcome">欢迎 <span id="currentUserName"></span></span>
                <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 退出</button>
            </div>
        </header>

        <nav>
            <ul>
                <li><a href="index.html"><i class="fas fa-home"></i> 首页</a></li>
                <li><a href="todo.html" class="active"><i class="fas fa-check-circle"></i> 待办</a></li>
                <li><a href="schedule.html"><i class="fas fa-clock"></i> 日程</a></li>
                <li><a href="period.html"><i class="fas fa-heartbeat"></i> 生理期</a></li>
                <li><a href="stats.html"><i class="fas fa-chart-bar"></i> 数据统计</a></li>
            </ul>
        </nav>

        <main>
            <!-- Stats -->
            <section class="stats-container fade-in">
                <div class="stat-card">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">全部任务</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="pendingCount">0</div>
                    <div class="stat-label">待完成</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="completedCount">0</div>
                    <div class="stat-label">已完成</div>
                </div>
            </section>

            <!-- Add Todo -->
            <section class="card fade-in">
                <h2 class="card-title"><i class="fas fa-plus-circle"></i> 添加新任务</h2>
                <form id="todoForm">
                    <div class="form-group">
                        <input type="text" class="form-control" id="todoInput" placeholder="输入待办事项..." required>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-plus"></i> 添加任务
                    </button>
                </form>
            </section>

            <!-- Filter Tabs -->
            <section class="card fade-in">
                <div class="filter-tabs">
                    <button class="filter-tab active" data-filter="all">全部</button>
                    <button class="filter-tab" data-filter="pending">待完成</button>
                    <button class="filter-tab" data-filter="completed">已完成</button>
                </div>

                <!-- Todo List -->
                <ul class="todo-list" id="todoList">
                    <!-- Todos will be rendered here -->
                </ul>

                <div id="emptyState" class="empty-state" style="display: none;">
                    <i class="fas fa-clipboard-list"></i>
                    <h3>暂无待办事项</h3>
                    <p>添加你的第一个任务吧！</p>
                </div>
            </section>
        </main>

        <footer>
            <p>Made with <i class="fas fa-heart" style="color: #f56565;"></i> by Life Tracker</p>
        </footer>
    </div>

    <!-- Edit Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title"><i class="fas fa-edit"></i> 编辑任务</h3>
                <button class="modal-close" onclick="closeEditModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="editForm">
                <div class="form-group">
                    <label>任务内容</label>
                    <input type="text" class="form-control" id="editInput" required>
                    <input type="hidden" id="editId">
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存修改</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        let currentFilter = 'all';
        let editingId = null;

        document.addEventListener('DOMContentLoaded', function() {
            renderTodos();
            updateStats();

            // Form submission
            document.getElementById('todoForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const input = document.getElementById('todoInput');
                const text = input.value.trim();
                
                if (text) {
                    addTodo(text);
                    input.value = '';
                    renderTodos();
                    updateStats();
                    showNotification('任务添加成功！');
                }
            });

            // Edit form submission
            document.getElementById('editForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const text = document.getElementById('editInput').value.trim();
                const id = document.getElementById('editId').value;
                
                if (text && id) {
                    updateTodo(id, { text: text });
                    closeEditModal();
                    renderTodos();
                    showNotification('任务修改成功！');
                }
            });

            // Filter tabs
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    renderTodos();
                });
            });
        });

        function renderTodos() {
            const todoList = document.getElementById('todoList');
            const emptyState = document.getElementById('emptyState');
            const todos = getTodos();

            // Filter todos
            let filteredTodos = todos;
            if (currentFilter === 'pending') {
                filteredTodos = todos.filter(t => !t.completed);
            } else if (currentFilter === 'completed') {
                filteredTodos = todos.filter(t => t.completed);
            }

            // Sort: pending first, then by date
            filteredTodos.sort((a, b) => {
                if (a.completed === b.completed) {
                    return new Date(b.createdAt) - new Date(a.createdAt);
                }
                return a.completed ? 1 : -1;
            });

            if (filteredTodos.length === 0) {
                todoList.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            todoList.innerHTML = filteredTodos.map(todo => `
                <li class="todo-item ${todo.completed ? 'completed' : ''}" data-id="${todo.id}">
                    <div class="todo-checkbox" onclick="toggleTodoItem('${todo.id}')">
                        <i class="fas fa-check"></i>
                    </div>
                    <span class="todo-text">${escapeHtml(todo.text)}</span>
                    <div class="todo-actions">
                        <button class="todo-btn edit" onclick="openEditModal('${todo.id}')" title="编辑">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="todo-btn delete" onclick="deleteTodoItem('${todo.id}')" title="删除">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </li>
            `).join('');
        }

        function toggleTodoItem(id) {
            toggleTodo(id);
            renderTodos();
            updateStats();
            
            const todo = getTodos().find(t => t.id === id);
            if (todo && todo.completed) {
                showNotification('恭喜！任务已完成 🎉');
            }
        }

        function deleteTodoItem(id) {
            confirmDialog('确定要删除这个任务吗？', () => {
                deleteTodo(id);
                renderTodos();
                updateStats();
                showNotification('任务已删除');
            });
        }

        function openEditModal(id) {
            const todo = getTodos().find(t => t.id === id);
            if (todo) {
                document.getElementById('editInput').value = todo.text;
                document.getElementById('editId').value = id;
                document.getElementById('editModal').classList.add('active');
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            document.getElementById('editInput').value = '';
            document.getElementById('editId').value = '';
        }

        function updateStats() {
            const stats = getTodoStats();
            document.getElementById('totalCount').textContent = stats.total;
            document.getElementById('pendingCount').textContent = stats.pending;
            document.getElementById('completedCount').textContent = stats.completed;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Close modal when clicking outside
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeEditModal();
            }
        });
    </script>
    <script>
        document.getElementById('currentUserName').textContent = getCurrentUser();
    </script>
</body>
</html>
